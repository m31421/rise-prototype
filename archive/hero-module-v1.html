  Archived snapshot — hero module v1 (pre–full-bleed orange hero).
  CSS for this version: archive/hero-module-v1.css (extracted from global.css).

<!-- RISE Internet — hero section markup (include below site header, inside <main>) -->
<section class="hero" aria-labelledby="hero-heading">
  <div class="hero__announcement">
    <p class="body-md">
      <a href="#refer">Know someone who deserves better internet? <span class="hero__announcement__link-em">Refer a friend</span> and you both win.</a>
    </p>
  </div>

  <div class="hero__stage">
    <div class="hero__photos">
      <div class="hero__photo-wrap hero__photo-wrap--tl" data-parallax="0.06">
        <div class="hero__photo-tilt">
          <img
            src="images/photo-02.png"
            width="260"
            height="195"
            loading="lazy"
            decoding="async"
            alt="Person with headphones using a tablet outdoors near water"
          />
        </div>
      </div>
      <div class="hero__photo-wrap hero__photo-wrap--tr" data-parallax="0.08">
        <div class="hero__photo-tilt">
          <img
            src="images/photo-03.png"
            width="240"
            height="320"
            loading="lazy"
            decoding="async"
            alt="Hands holding a smartphone out of a car window over a sunny field"
          />
        </div>
      </div>
      <div class="hero__photo-wrap hero__photo-wrap--cr" data-parallax="0.065">
        <div class="hero__photo-tilt">
          <img
            src="images/photo-04.png"
            width="1032"
            height="648"
            loading="lazy"
            decoding="async"
            alt="Happy family using fast internet at home"
          />
        </div>
      </div>
      <div class="hero__photo-wrap hero__photo-wrap--bl" data-parallax="0.05">
        <div class="hero__photo-tilt">
          <img
            src="images/photo-01.png"
            width="1032"
            height="648"
            loading="lazy"
            decoding="async"
            alt="Two people smiling and pointing, excited at home"
          />
        </div>
      </div>
    </div>

    <div class="hero__inner">
      <h1 id="hero-heading">
        SPEED, SERVICE,<br />
        AND VALUE
      </h1>
      <p class="hero__subhead body-xl">
        See what you can do with reliable internet + remarkable service.
      </p>

      <form
        id="check-availability"
        class="hero__search"
        role="search"
        aria-label="Check service availability at your address"
        action="#"
        method="get"
      >
        <div class="hero__search-inner">
          <label for="hero-address" class="visually-hidden">Address, city, or ZIP code</label>
          <input
            id="hero-address"
            class="hero__input"
            type="search"
            name="q"
            placeholder="Enter your address, city or zip code"
            autocomplete="street-address"
            inputmode="text"
          />
          <button type="submit" class="hero__submit" aria-label="Check availability">
            <span class="hero__submit-text">Check Availability</span>
            <svg class="hero__submit-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
        </div>
      </form>
    </div>
  </div>
</section>
